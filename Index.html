<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snowman: Hardcore Storm</title>
    <style>
        body { background: #000; color: white; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; user-select: none; touch-action: manipulation; }
        #game-container { position: relative; width: 340px; height: 480px; border: 2px solid #fff; margin-top: 10px; background: black; overflow: hidden;}
        
        #intro-screen, #battle-screen { width: 100%; height: 100%; position: relative; }
        #battle-screen { display: none; }

        #overworld-snowman { position: absolute; top: 100px; left: 140px; font-size: 50px; }
        #snack-ball { position: absolute; top: 140px; left: 210px; width: 15px; height: 15px; background: white; border-radius: 50%; box-shadow: 0 0 10px white; animation: pulse 1s infinite; }
        #overworld-heart { position: absolute; width: 16px; height: 16px; background: red; clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 50% 80%, 20% 100%, 0% 35%); }

        .status-container { width: 85%; margin: 5px auto; font-size: 11px; }
        .bar-bg { width: 100%; height: 10px; background: #333; border: 1px solid white; margin-top: 2px; }
        #boss-fill { width: 100%; height: 100%; background: #f00; transition: width 0.3s; }
        #mercy-fill { width: 0%; height: 100%; background: #0f0; transition: width 0.3s; }
        #snowman { position: absolute; top: 70px; width: 100%; text-align: center; font-size: 55px; transition: all 0.4s; }
        #dialogue { position: absolute; top: 145px; width: 90%; left: 5%; font-size: 12px; text-align: center; min-height: 45px; font-weight: bold; color: #fff;}
        
        #battle-box { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); width: 220px; height: 120px; border: 4px solid white; background: black; overflow: hidden; }
        #heart { position: absolute; width: 16px; height: 16px; background: red; clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 50% 80%, 20% 100%, 0% 35%); z-index: 10; transition: background 0.2s;}
        #hp-player { position: absolute; bottom: 95px; width: 100%; text-align: center; color: #ffeb3b; font-weight: bold; }

        .bullet { position: absolute; background: white; border-radius: 50%; width: 10px; height: 10px; pointer-events: none; }
        .giant { width: 38px !important; height: 38px !important; border: 2px solid #ccc; box-shadow: 0 0 10px #fff; }
        .heal { background: #00ff00 !important; box-shadow: 0 0 15px #00ff00; z-index: 11; width: 14px; height: 14px;}
        
        .invincible { opacity: 0.5; animation: blink 0.1s infinite; }
        @keyframes blink { 0% { opacity: 0; } 100% { opacity: 1; } }

        #ui-bottom { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 5px; }
        #action-btns { display: flex; gap: 15px; }
        #controls { display: grid; grid-template-columns: repeat(3, 50px); gap: 5px; }
        .btn { width: 50px; height: 50px; background: #222; border: 2px solid white; display: flex; justify-content: center; align-items: center; border-radius: 8px; font-size: 20px;}
        .act-btn { padding: 12px 20px; border: 2px solid orange; font-weight: bold; border-radius: 5px; font-size: 14px; transition: 0.2s;}
        .disabled { opacity: 0.3; }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px; box-sizing: border-box;}
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .fury { animation: shake 0.15s infinite; color: #ff0000 !important; }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(2px, -2px); } }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="intro-screen">
            <div id="overworld-snowman">☃️</div>
            <div id="snack-ball"></div>
            <div id="overworld-heart"></div>
        </div>

        <div id="battle-screen">
            <div id="overlay">
                <h2 id="msg-final"></h2>
                <p id="sub-msg-final" style="font-size: 14px; margin-bottom: 20px;"></p>
                <button onclick="location.reload()" style="padding:10px 20px;">RECOMEÇAR</button>
            </div>
            <div class="status-container">
                HP INIMIGO: <div class="bar-bg"><div id="boss-fill"></div></div>
                MISERICÓRDIA: <div class="bar-bg"><div id="mercy-fill"></div></div>
            </div>
            <div id="snowman">☃️</div>
            <div id="dialogue">* O tempo está fechando...</div>
            <div id="battle-box"><div id="heart"></div></div>
            <div id="hp-player">HP: <span id="hp">20</span>/20</div>
        </div>
    </div>

    <div id="ui-bottom">
        <div id="action-btns">
            <div class="act-btn" id="attack-btn">ATACAR</div>
            <div class="act-btn" id="spare-btn">POUPAR</div>
        </div>
        <div id="controls">
            <div></div><div class="btn" id="up">▲</div><div></div>
            <div class="btn" id="left">◀</div><div class="btn" id="down">▼</div><div class="btn" id="right">▶</div>
        </div>
    </div>

    <script>
        const heartBattle = document.getElementById('heart');
        const heartIntro = document.getElementById('overworld-heart');
        const introScreen = document.getElementById('intro-screen');
        const battleScreen = document.getElementById('battle-screen');
        
        let introPos = { x: 160, y: 350 };
        let battlePos = { x: 102, y: 50 };
        let inBattle = false;
        let gameActive = true;
        let playerHp = 20;
        let isInvincible = false;
        let bossHp = 100;
        let convince = 0;
        let status = "NORMAL";
        let cooldown = false;
        const keys = {};

        // Controles Mobile
        const bindKey = (id, k) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[k] = true; });
            el.addEventListener('touchend', () => { keys[k] = false; });
        };
        ['up','down','left','right'].forEach(k => bindKey(k, k));

        function update() {
            if (!gameActive) return;
            let speed = inBattle ? 5.8 : 3.5;

            if (!inBattle) {
                if (keys.up && introPos.y > 0) introPos.y -= speed;
                if (keys.down && introPos.y < 460) introPos.y += speed;
                if (keys.left && introPos.x > 0) introPos.x -= speed;
                if (keys.right && introPos.x < 320) introPos.x += speed;
                heartIntro.style.left = introPos.x + 'px';
                heartIntro.style.top = introPos.y + 'px';
                if (Math.abs(introPos.x - 210) < 15 && Math.abs(introPos.y - 140) < 15) startBattle();
            } else {
                if (keys.up && battlePos.y > 0) battlePos.y -= speed;
                if (keys.down && battlePos.y < 104) battlePos.y += speed;
                if (keys.left && battlePos.x > 0) battlePos.x -= speed;
                if (keys.right && battlePos.x < 204) battlePos.x += speed;
                heartBattle.style.left = battlePos.x + 'px';
                heartBattle.style.top = battlePos.y + 'px';
            }
            requestAnimationFrame(update);
        }

        function startBattle() {
            inBattle = true;
            document.body.style.background = 'white';
            setTimeout(() => {
                document.body.style.background = 'black';
                introScreen.style.display = 'none';
                battleScreen.style.display = 'block';
                startAttackPatterns();
            }, 100);
        }

        function createBullet(x, y, vx, vy, type = 'normal') {
            if (!gameActive) return;
            const b = document.createElement('div');
            b.className = 'bullet ' + (type === 'giant' ? 'giant' : '') + (type === 'heal' ? 'heal' : '');
            b.style.left = x + 'px'; b.style.top = y + 'px';
            document.getElementById('battle-box').appendChild(b);

            let move = setInterval(() => {
                if (!gameActive) { clearInterval(move); b.remove(); return; }
                x += vx; y += vy;
                
                if (type === 'zigzag') {
                    if (y <= 0 || y >= 110) vy *= -1;
                }

                b.style.left = x + 'px'; b.style.top = y + 'px';
                let hitSize = type === 'giant' ? 36 : 8;
                
                if (x > battlePos.x - hitSize && x < battlePos.x + 14 && y > battlePos.y - hitSize && y < battlePos.y + 14) {
                    if (type === 'heal') {
                        playerHp = Math.min(20, playerHp + 5);
                        document.getElementById('hp').innerText = playerHp;
                        heartBattle.style.background = '#00ff00';
                        setTimeout(() => heartBattle.style.background = 'red', 200);
                    } else {
                        takeDamage(type === 'giant' ? 4 : 2);
                    }
                    b.remove(); clearInterval(move);
                }
                if (y > 150 || y < -100 || x > 250 || x < -100) { b.remove(); clearInterval(move); }
            }, 20);
        }

        // ATAQUES FREQUENTES
        function waveAttack() {
            let gap = Math.floor(Math.random() * 5); // Espaço aleatório para passar
            for(let i=0; i<7; i++) {
                if(i !== gap && i !== gap+1) {
                    setTimeout(() => createBullet(i*32, -20, 0, 3.5), i * 50);
                }
            }
        }

        function zigzagAttack() {
            createBullet(-15, 20, 4, 3.2, 'zigzag');
            if(status === "FURY") createBullet(230, 100, -4, -3.2, 'zigzag');
        }

        function showerAttack() {
            for(let i=0; i<4; i++) {
                setTimeout(() => createBullet(Math.random()*200, -20, 0, 4), i * 300);
            }
        }

        function startAttackPatterns() {
            // Loop de ataques especiais (mais frequente)
            setInterval(() => {
                if (!gameActive || status === "CALM") return;
                let r = Math.random();
                if (r < 0.4) waveAttack();
                else if (r < 0.7) zigzagAttack();
                else createBullet(Math.random()*180, -50, 0, 2, 'giant');
                
                // No modo fúria, dobra o ataque
                if (status === "FURY") {
                    setTimeout(() => { if(gameActive) showerAttack(); }, 700);
                }
            }, 1400); // Antes era 2500ms

            // Bolas de neve ambiente (chuva constante)
            setInterval(() => {
                if (inBattle && gameActive && status !== "CALM") {
                    createBullet(Math.random()*210, -15, 0, status === "FURY" ? 5 : 3);
                }
            }, 450);

            // Cura Verde (A cada 10 segundos)
            setInterval(() => {
                if (gameActive && playerHp < 15) createBullet(Math.random()*180, -20, 0, 2, 'heal');
            }, 10000);
        }

        function takeDamage(dmg) {
            if (isInvincible || !gameActive) return;
            playerHp -= dmg;
            document.getElementById('hp').innerText = Math.max(0, playerHp);
            if (playerHp <= 0) endGame("DEATH");
            else {
                isInvincible = true;
                heartBattle.classList.add('invincible');
                setTimeout(() => { isInvincible = false; heartBattle.classList.remove('invincible'); }, 800);
            }
        }

        document.getElementById('attack-btn').addEventListener('touchstart', (e) => {
            e.preventDefault(); if (cooldown || !gameActive) return;
            if (status === "CALM") { bossHp = 0; endGame("BETRAYAL"); return; }
            bossHp -= 10; updateBars(); checkPhase();
            if (bossHp <= 0) endGame("KILL");
            setCooldown();
        });

        document.getElementById('spare-btn').addEventListener('touchstart', (e) => {
            e.preventDefault(); if (cooldown || !gameActive) return;
            if (status === "FURY") { endGame("FLEE"); return; }
            convince += 10; updateBars(); checkPhase();
            if (convince >= 100) endGame("SPARE");
            setCooldown();
        });

        function updateBars() {
            document.getElementById('boss-fill').style.width = Math.max(0, bossHp) + "%";
            document.getElementById('mercy-fill').style.width = Math.min(100, convince) + "%";
        }

        function setCooldown() {
            cooldown = true;
            document.querySelectorAll('.act-btn').forEach(b => b.classList.add('disabled'));
            setTimeout(() => {
                cooldown = false;
                document.querySelectorAll('.act-btn').forEach(b => b.classList.remove('disabled'));
            }, 1200);
        }

        function checkPhase() {
            if (bossHp <= 20 && status !== "FURY") {
                status = "FURY";
                document.getElementById('snowman').classList.add('fury');
                document.getElementById('dialogue').innerText = "* NEVASCA MORTAL ATIVADA!";
            } else if (convince >= 80 && status !== "CALM") {
                status = "CALM";
                document.getElementById('snowman').style.opacity = "0.4";
                document.getElementById('dialogue').innerText = "* O boneco parou de lutar.";
            }
        }

        function endGame(type) {
            gameActive = false;
            document.getElementById('overlay').style.display = "flex";
            const msg = document.getElementById('msg-final');
            const sub = document.getElementById('sub-msg-final');
            if (type === "BETRAYAL") { msg.innerText = "TRAIÇÃO"; sub.innerText = "Cruel. Você destruiu quem te perdoou."; }
            else if (type === "FLEE") { msg.innerText = "FUGITIVO"; sub.innerText = "O boneco não aguentou a pressão e sumiu."; }
            else if (type === "KILL") { msg.innerText = "VITÓRIA"; sub.innerText = "O campo está limpo... e frio."; }
            else if (type === "SPARE") { msg.innerText = "AMIZADE"; sub.innerText = "Vocês fizeram as pazes!"; }
            else { msg.innerText = "GAME OVER"; sub.innerText = "Você virou parte da paisagem branca."; }
        }

        update();
    </script>
</body>
</html>
